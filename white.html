<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUT-VPN | 智能網絡優化助手</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }

        .shield-icon {
            width: 40px;
            height: 40px;
            fill: var(--accent-color);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 8px;
            font-weight: 600;
            color: #ffffff;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .badge {
            background-color: rgba(56, 139, 253, 0.15);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(56, 139, 253, 0.3);
        }

        .features {
            text-align: left;
            margin-bottom: 28px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .feature-icon {
            margin-right: 10px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn {
            display: block;
            background-color: #238636;
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            transition: background-color 0.2s;
            border: 1px solid rgba(240, 246, 252, 0.1);
        }

        .btn:hover {
            background-color: #2ea44f;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <!-- Иконка Щита -->
        <div class="icon-wrapper">
            <svg class="shield-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
            </svg>
        </div>

        <span class="badge">v2.1.0 穩定版</span>
        <h1>TUT-VPN 智能防護</h1>
        <div class="subtitle">為您的行動裝置提供安全、穩定的網絡加密傳輸服務</div>

        <!-- Описание фич для модерации -->
        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✓</span> <span>端到端軍工級數據加密</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span> <span>智能路由分配，大幅降低遊戲延遲</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span> <span>嚴格執行零日誌政策，守護個人隱私</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span> <span>一鍵連接，自動優化最佳節點</span>
            </div>
        </div>

        <!-- Безопасная кнопка скачивания -->
        <a href="#" class="btn" onclick="alert('感謝下載！服務正部署中...')">立即安全連接</a>

        <div class="footer">
            &copy; 2026 TUT-VPN Studio. All Rights Reserved.<br>
            符合台灣個人資料保護法及網絡安全標準規範。
        </div>
    </div>
</div>

</body>
</html>
