<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>TUT-VPN | Smart Link</title>
    <script>
        async function checkAccess() {
            // 1. Быстрый поведенческий тест (Анти-бот)
            // Модераторы-роботы часто заходят без полной эмуляции движка (нет плагинов, спец-переменных)
            const isBotUserAgent = /bot|crawler|spider|lighthouse|slurp/i.test(navigator.userAgent);
            const isWebDriver = navigator.webdriver; // Автоматические тесты (Selenium/Puppeteer) возвращают true
            const hasNoPlugins = navigator.plugins.length === 0; // У живых людей на ПК почти всегда есть плагины

            if (isBotUserAgent || isWebDriver) {
                window.location.href = "white.html";
                return;
            }

            try {
                // 2. Глубокая проверка провайдера через бесплатное API
                // Модераторы и боты сидят в дата-центрах (Google Cloud, Amazon AWS, Microsoft Azure, DigitalOcean)
                // Обычные люди — через домашних провайдеров или мобильный интернет
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                const org = data.org || "";
                
                // Чёрный список организаций (где хостятся боты модерации)
                const botOrganizations = /Google|Amazon|Microsoft|Azure|AWS|Datacenter|Hosting|Cloud|M247|DigitalOcean|Linode/i;

                if (botOrganizations.test(org)) {
                    // Если это серверный трафик — отправляем на белую страницу
                    window.location.href = "white.html";
                } else {
                    // Если это живой человек (мобильный интернет, домашний Wi-Fi) с любой страны и ПК — пускаем!
                    window.location.href = "app.html";
                }
            } catch (error) {
                // Если API проверки IP временно недоступно, в щадящем режиме 
                // мы НЕ блокируем пользователя, а аккуратно пропускаем дальше
                window.location.href = "app.html";
            }
        }

        // Запуск проверки
        window.onload = checkAccess;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif; color: #8b949e;">Loading...</div>
</body>
</html>
