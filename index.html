<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Taiwan Gaming Hub</title>
    <script>
        async function checkAccess() {
            // 1. Фильтр по устройству (Shorts смотрят с мобилок, боты часто с ПК)
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            // 2. Фильтр по языку браузера
            const userLang = navigator.language || navigator.userLanguage;
            const isChinese = userLang.includes('zh') || userLang.includes('tw');

            if (!isMobile || !isChinese) {
                window.location.href = "white.html";
                return;
            }

            try {
                // 3. Фильтр по ГЕО и Провайдеру (отсекаем дата-центры)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                const allowedCountries = ['TW', 'HK'];
                const isBotOrg = /Google|Amazon|Microsoft|Datacenter|Hosting|Cloud/i.test(data.org);

                if (allowedCountries.includes(data.country_code) && !isBotOrg) {
                    // Целевой тайванец -> на замаскированный оффер
                    window.location.href = "app.html";
                } else {
                    window.location.href = "white.html";
                }
            } catch (error) {
                // В случае любой ошибки API — перестраховка на white page
                window.location.href = "white.html";
            }
        }
        window.onload = checkAccess;
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif; color: #8b949e;">Loading...</div>
</body>
</html>
